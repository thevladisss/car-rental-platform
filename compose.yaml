services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: personalio
      POSTGRES_USER: personalio
      POSTGRES_PASSWORD: personalio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U personalio -d personalio"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/personalio
      SPRING_DATASOURCE_USERNAME: personalio
      SPRING_DATASOURCE_PASSWORD: personalio
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
